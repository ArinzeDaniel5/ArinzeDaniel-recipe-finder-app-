<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="Width=device-width,
    initial-scale=1.0">
    <title>ArinzeDaniel Recipe Finder</title>
    <link rel="stylesheet"href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Lora:wght@600&family=Nunito:wght@300;400&family=JetBrains+Mono:wght@400&display=swap"rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>ArinzeDaniel Recipe Finder</h1>
        <div class="controls">
            <input type="text"id="searchInput"placeholder="Search recipes...">
            <button id="searchBtn">Search</button>
            <select id="categorySelect">
                <option value="">All Categories</option>
            </select>
            <button id="viewFavorites">❤️ Favourites</button>
        </div>
        <div id="recipesContainer"></div>
    </div>
    <div id="recipeModal"class="modal-hidden">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <div id="recipeDetails"></div>
        </div>
    </div>
    <a href="#"class="btn">Go to top</a>
    <script src="script.js"></script>
</body>
</html>
